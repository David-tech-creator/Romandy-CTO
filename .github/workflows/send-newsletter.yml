name: Send Weekly Newsletter

on:
  schedule:
    # Every Monday at 7:00 AM UTC (8:00 AM CET / 9:00 AM CEST)
    - cron: '0 7 * * 1'
  workflow_dispatch:
    # Allow manual trigger from GitHub Actions tab

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Send newsletter
        env:
          RESEND_API_KEY:    ${{ secrets.RESEND_API_KEY }}
          RESEND_FROM:       ${{ secrets.RESEND_FROM }}
          SUPABASE_URL:      ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_KEY:      ${{ secrets.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_DEFAULT_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY:    ${{ secrets.OPENAI_API_KEY }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_DEFAULT_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_DEFAULT_KEY }}
        run: node scripts/send-newsletter.mjs
